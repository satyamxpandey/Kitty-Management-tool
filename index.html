<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jewllz Auto-Passbook & Master Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>.hidden-view { display: none !important; }</style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased">

    <div id="customerView" class="max-w-md mx-auto min-h-screen p-4 flex flex-col justify-between">
        <div>
            <header class="text-center py-6">
                <h1 class="text-2xl font-bold text-amber-600 tracking-tight">JEWLLZ KITTY SYSTEM</h1>
                <p class="text-xs text-gray-400 uppercase tracking-widest mt-1">Live Passbook Ledger</p>
            </header>

            <div class="bg-white rounded-2xl shadow-xs p-6 border border-gray-100 mb-6">
                <input type="tel" id="phoneInput" placeholder="Enter Registered Phone" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-amber-500 mb-3">
                <button onclick="fetchPassbook()" id="fetchBtn" class="w-full bg-amber-600 text-white font-medium py-3 rounded-xl text-sm shadow-xs hover:bg-amber-700 transition-all cursor-pointer">View Passbook</button>
            </div>

            <div id="passbookContainer" class="hidden-view space-y-6">
                <div class="bg-gradient-to-br from-amber-600 to-amber-700 text-white rounded-2xl p-6">
                    <h3 id="custName" class="text-lg font-bold">-</h3>
                    <p id="custPhone" class="text-xs opacity-75">-</p>
                    <div class="mt-4 pt-4 border-t border-white/20 flex justify-between"><span class="text-xs">Monthly contribution</span><span id="custAmount" class="font-bold">₹0</span></div>
                </div>
                <div class="bg-white rounded-2xl p-6 border border-gray-100">
                    <div id="gridWrapper" class="grid grid-cols-4 gap-3"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="adminView" class="hidden-view max-w-5xl mx-auto p-6">
        <header class="flex justify-between items-center border-b border-gray-200 pb-5 mb-6">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Jewllz Master Control</h1>
                <p class="text-xs text-gray-500">Real-time Automated Dashboard</p>
            </div>
            <button onclick="loadAdminDashboard()" class="bg-amber-600 text-white text-xs font-semibold px-4 py-2.5 rounded-lg hover:bg-amber-700 cursor-pointer">Sync Pending Payments</button>
        </header>

        <div class="bg-white rounded-2xl border border-gray-200 shadow-xs overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="text-xs font-semibold text-gray-500 bg-gray-50 border-b border-gray-100">
                        <th class="p-4">Phone Number</th>
                        <th class="p-4">Month</th>
                        <th class="p-4">Amount</th>
                        <th class="p-4">UTR Reference / Receipt</th>
                        <th class="p-4 text-center">Action</th>
                    </tr>
                </thead>
                <tbody id="adminTableBody" class="divide-y divide-gray-100 text-sm">
                    <tr><td colspan="5" class="p-8 text-center text-gray-400 italic">Click "Sync Pending Payments" to clear pending logs.</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // AAPKA LIVE SCRIPT URL LINK IDHAR 100% SET HAI:
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxc4D1Hq2sf6z5MOEVhJLW1jHGuur10ZNROO-giDYNznTNILqxatg1LpZqmTHjtmvKAsQ/exec";

        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('view') === 'admin') {
                document.getElementById('customerView').classList.add('hidden-view');
                document.getElementById('adminView').classList.remove('hidden-view');
                loadAdminDashboard();
            }
        });

        function fetchPassbook() {
            const phone = document.getElementById('phoneInput').value.trim();
            if(!phone) return alert("Please enter a phone number.");
            
            const fetchBtn = document.getElementById('fetchBtn');
            fetchBtn.innerText = "Fetching...";
            fetchBtn.disabled = true;

            fetch(`${SCRIPT_URL}?action=getData&id=${phone}`)
            .then(r => r.json()).then(data => {
                fetchBtn.innerText = "View Passbook";
                fetchBtn.disabled = false;
                
                if(!data.profile) return alert("Record not found. Please check the Google Sheet to ensure this phone number exists in the 'Customers' tab.");
                document.getElementById('passbookContainer').classList.remove('hidden-view');
                document.getElementById('custName').innerText = data.profile.name;
                document.getElementById('custPhone').innerText = "+91 " + data.profile.phone;
                document.getElementById('custAmount').innerText = "₹" + data.profile.monthlyAmount;
                
                const grid = document.getElementById('gridWrapper'); grid.innerHTML = "";
                for (let m = 1; m <= 11; m++) {
                    const tx = data.transactions.find(t => Number(t.month) === m);
                    let label = "Unpaid", style = "bg-gray-50 text-gray-400";
                    if(tx && tx.status === "Paid") { label = "✅ Paid"; style = "bg-emerald-50 text-emerald-700 font-bold"; }
                    else if(tx && tx.status === "Pending") { label = "⏳ Pending"; style = "bg-amber-50 text-amber-700 animate-pulse"; }
                    grid.innerHTML += `<div class="p-3 rounded-xl ${style} text-center text-xs"><span class="text-[9px] block opacity-60">M-${m}</span>${label}</div>`;
                }
            }).catch(err => {
                fetchBtn.innerText = "View Passbook";
                fetchBtn.disabled = false;
                alert("Network connection error or Google Script deployment is block-checking.");
            });
        }

        function loadAdminDashboard() {
            const body = document.getElementById('adminTableBody');
            body.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-gray-500">Fetching live requests...</td></tr>`;
            
            fetch(`${SCRIPT_URL}?action=getData&id=all_pending`)
            .then(r => r.json()).then(pendingList => {
                if(pendingList.length === 0) {
                    body.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-emerald-600 font-medium">🎉 Great job! No pending verifications left.</td></tr>`;
                    return;
                }
                body.innerHTML = "";
                pendingList.forEach(item => {
                    body.innerHTML += `
                        <tr id="row-${item.row}">
                            <td class="p-4 font-medium">${item.phone}</td>
                            <td class="p-4">Month ${item.month}</td>
                            <td class="p-4 font-semibold">₹${item.amount}</td>
                            <td class="p-4 text-xs text-gray-500">
                                <div>UTR: ${item.utr}</div>
                                ${item.screenshot ? `<a href="${item.screenshot}" target="_blank" class="text-amber-600 underline font-medium block mt-1">View Slip Receipt ↗</a>` : ''}
                            </td>
                            <td class="p-4 text-center">
                                <button onclick="executeApproval(${item.row})" class="bg-emerald-600 text-white text-xs px-3 py-1.5 rounded-md hover:bg-emerald-700 font-medium transition-all cursor-pointer">Approve Instantly</button>
                            </td>
                        </tr>
                    `;
                });
            });
        }

        function executeApproval(rowId) {
            if(!confirm("Are you sure you want to approve this transaction?")) return;
            const rowEl = document.getElementById(`row-${rowId}`);
            rowEl.style.opacity = "0.4";

            fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ action: "approve", row: rowId })
            }).then(r => r.json()).then(success => {
                if(success) {
                    rowEl.remove();
                    alert("Transaction updated to PAID successfully inside Google Sheets!");
                }
            });
        }
    </script>
</body>
</html>
